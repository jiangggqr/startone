services:
  - type: web
    name: startone-learning
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: STARTFRAME_MODE
        value: real
      - key: OPENAI_API_KEY
        sync: false
      - key: STARTFRAME_HOST
        value: 0.0.0.0
      - key: STARTFRAME_SECURE_COOKIES
        value: "true"
      - key: STARTFRAME_MAX_FILE_MB
        value: "20"
      - key: STARTFRAME_MAX_FILES
        value: "5"
      - key: STARTFRAME_MAX_SESSIONS_PER_WORKSPACE
        value: "20"
      - key: STARTFRAME_MAX_SOURCES_PER_WORKSPACE
        value: "50"
